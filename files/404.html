
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            color:white;
        }

        .container{
            text-align:center;
            z-index:2;
        }

        .error-code{
            font-size:150px;
            font-weight:bold;
            color:#38bdf8;
            text-shadow:0 0 25px rgba(56,189,248,.6);
            animation: float 3s ease-in-out infinite;
        }

        .title{
            font-size:35px;
            margin-top:-20px;
            margin-bottom:15px;
        }

        .desc{
            color:#cbd5e1;
            font-size:18px;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            padding:14px 30px;
            background:#38bdf8;
            color:#0f172a;
            text-decoration:none;
            border-radius:12px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            background:#0ea5e9;
            transform:scale(1.05);
        }

        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(56,189,248,0.1);
            animation: pulse 6s infinite;
        }

        .circle:nth-child(1){
            width:300px;
            height:300px;
            top:-80px;
            left:-80px;
        }

        .circle:nth-child(2){
            width:250px;
            height:250px;
            bottom:-70px;
            right:-70px;
        }

        @keyframes float{
            0%,100%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-15px);
            }
        }

        @keyframes pulse{
            0%{
                transform:scale(1);
                opacity:.5;
            }
            50%{
                transform:scale(1.2);
                opacity:.2;
            }
            100%{
                transform:scale(1);
                opacity:.5;
            }
        }
    </style>
</head>

<body>

    <div class="circle"></div>
    <div class="circle"></div>

    <div class="container">
        <div class="error-code">404</div>

        <h1 class="title">Página no encontrada</h1>

        <p class="desc">
            La página que intentas visitar no existe o fue movida.
        </p>

        <a href="/" class="btn">
            Volver al inicio
        </a>
    </div>

</body>
</html>
